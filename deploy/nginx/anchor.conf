limit_req_zone $binary_remote_addr zone=anchor_rpm:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /var/www/anchor/ui;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    location = / {
        try_files /index.html =404;
    }

    location /_next/ {
        try_files $uri =404;
        access_log off;
        expires 1h;
    }

    location /query {
        limit_req zone=anchor_rpm burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000/query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
    }

    location = /readyz {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000/readyz;
    }

    location = /metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

