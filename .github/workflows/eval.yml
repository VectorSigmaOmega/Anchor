name: full-eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: anchor
          POSTGRES_USER: anchor
          POSTGRES_PASSWORD: anchor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anchor -d anchor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://anchor:anchor@localhost:5432/anchor
      VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
      VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
      GENERATION_MODEL: gemini-2.5-flash
      EMBEDDING_MODEL: gemini-embedding-2
      EMBEDDING_DIMENSION: 768
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Write GCP credentials
        run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json

      - name: Migrate
        run: python -m anchor.db.migrate

      - name: Ingest corpus
        run: python -m anchor.ingest.cli

      - name: Run full eval
        run: python eval/run.py --write-docs

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: anchor-eval
          path: docs/EVAL.md

