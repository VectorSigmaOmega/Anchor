name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install frontend
        working-directory: ui
        run: npm ci

      - name: Lint
        run: make lint PYTHON=python

      - name: Tests
        run: make test PYTHON=python

      - name: UI build
        working-directory: ui
        run: npm run build

      - name: Smoke eval
        run: python eval/run.py --smoke --fixture-mode --write-docs

      - name: Container build
        run: docker build -f deploy/docker/Dockerfile -t anchor-api .
